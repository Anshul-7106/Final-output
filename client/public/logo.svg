<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)"/>
  
  <!-- Book/Learning icon -->
  <g transform="translate(100, 100)">
    <!-- Left page -->
    <path d="M -35 -30 L -10 -30 L -10 30 L -35 30 Q -45 20 -45 0 Q -45 -20 -35 -30" 
          fill="#ffffff" opacity="0.9"/>
    
    <!-- Right page -->
    <path d="M 10 -30 L 35 -30 Q 45 -20 45 0 Q 45 20 35 30 L 10 30 L 10 -30" 
          fill="#ffffff" opacity="0.7"/>
    
    <!-- Middle line (spine) -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    
    <!-- Decorative lines on left page -->
    <line x1="-30" y1="-15" x2="-15" y2="-15" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="-30" y1="-5" x2="-15" y2="-5" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="-30" y1="5" x2="-15" y2="5" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="-30" y1="15" x2="-15" y2="15" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Star for growth/achievement -->
    <polygon points="0,-45 5,-20 30,-20 12,0 18,25 0,5 -18,25 -12,0 -30,-20 -5,-20" 
             fill="#fbbf24" opacity="0.95"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">ENCORE ASCEND</text>
</svg>